name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx nuxt prepare

      - name: ESLint
        run: npm run lint

      - name: Stylelint
        run: npm run lint:style

      - name: Type Check
        run: npx nuxi typecheck
